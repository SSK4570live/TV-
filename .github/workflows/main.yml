name: run script main.py

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout repo content
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        
      - name: setup python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: '3.9'
          
      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: execute py script
        env:
          password: ${{ secrets.password }}
        run: python decrypt.py
          
      - name: commit and push changes
        run: |
          git config --local user.name "Webtv+Bot4570"
          git config --local user.email "webtv+bot4570.example.com"
          git add -A
          git diff-index --quiet HEAD || (git commit -a -m "😀 updated IPTV Links" && git push)